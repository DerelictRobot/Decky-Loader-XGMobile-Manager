name: Release

# Cuts a GitHub Release and attaches the sideloadable plugin zip.
# Trigger by pushing a version tag (e.g. `git tag v0.3.0 && git push origin v0.3.0`)
# or run manually from the Actions tab (workflow_dispatch) with a tag name.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Build plugin bundle
        run: bash build.sh

      - name: Resolve release tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists -- replacing asset."
            gh release upload "$TAG" xgmobile-manager.zip --clobber
          else
            echo "Creating release $TAG."
            gh release create "$TAG" xgmobile-manager.zip \
              --title "xgmobile-manager $TAG" \
              --generate-notes
          fi
